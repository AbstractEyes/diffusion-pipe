# SDXL + per-block aleph relays (amoe bake-in): every BasicTransformerBlock
# wrapped with a RelayPatch2D at the DECLARED trunk dtype; trunk + both text
# encoders frozen (lr = 0 buckets); adapter-only saves (aleph_relay.pt in
# the dual fork/amoe format + aleph_relay.safetensors).
# The SDXL site count is PINNED AT THE FIRST REAL RUN (printed at attach),
# never hardcoded. Relay mode only on this path for now — multiband on the
# UNet pipeline layers is documented-deferred.

output_dir = '/workspace/ckpts2/aleph_sdxl_512'
dataset = 'examples/dataset.toml'

epochs = 4
max_steps = 3000
micro_batch_size_per_gpu = 4
pipeline_stages = 1
gradient_accumulation_steps = 1
gradient_clipping = 0
save_every_n_steps = 2500
checkpoint_every_n_minutes = 60
activation_checkpointing = true
save_dtype = 'bfloat16'
caching_batch_size = 8

[model]
type = 'sdxl'
checkpoint_path = '/workspace/models/sdxl/sd_xl_base_1.0_0.9vae.safetensors'
dtype = 'bfloat16'        # dtype law: adapters attach at THIS declared dtype
# v_pred = true           # v-prediction trunks welcome (objective recorded
                          # in the adapter save meta; the conditioning law
                          # makes v-pred the sharp follow-up substrate)

aleph_relay = true
aleph_relay_mode = 'relay'
aleph_relay_lr = 1e-3
unet_lr = 0               # frozen trunk (aleph paradigm)
text_encoder_1_lr = 0
text_encoder_2_lr = 0
# aleph_relay_path = '...'  # resume a saved stack

[optimizer]
type = 'adam'             # pure Adam — NEVER adamw on aleph paths
lr = 0
betas = [0.9, 0.99]
weight_decay = 0.0

[monitoring]
enable_wandb = false
